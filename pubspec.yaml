name: scheduling_mobile
description: "Smart Scheduling System - Mobile App for NORSU"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1

  # HTTP & Networking
  http: ^1.2.1

  # Secure Storage (for tokens)
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1

# flutter_native_splash config — run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/ic_logo.png
  android: true
  ios: true
  fullscreen: true
  android_12:
    color: "#FFFFFF"
    image: assets/images/ic_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/json/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Variable.ttf
