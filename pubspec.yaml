name: scheduling_mobile
description: Faculty Dashboard Mobile App for Full Scheduling System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  
  # UI/UX
  flutter_svg: ^2.0.0
  intl: ^0.19.0
  
  # Authentication & JWT
  jwt_decoder: ^2.0.1
  
  # Notifications
  flutter_local_notifications: ^14.1.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Logging
  logger: ^2.0.0
  
  # Models/Serialization
  json_annotation: ^4.8.0
  
  # Connectivity
  connectivity_plus: ^5.0.0
  
  # PDF Preview
  flutter_pdfview: ^1.3.0
  
  # Cupertino icons
  cupertino_icons: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/json/
